name: Build Windows Portable

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: Full
            lite: false
            artifact: DataAnonymizer
          - name: Lite
            lite: true
            artifact: DataAnonymizerLite

    runs-on: windows-latest
    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        shell: pwsh
        run: |
          Remove-Item -Path "C:\hostedtoolcache\CodeQL" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "C:\hostedtoolcache\go" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "C:\hostedtoolcache\Ruby" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        shell: pwsh
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install opencv-python-headless pytesseract Pillow numpy
          pip install pdfplumber python-docx openpyxl python-pptx
          if ("${{ matrix.lite }}" -eq "false") {
            pip install torch --index-url https://download.pytorch.org/whl/cpu
            pip install transformers ckip-transformers
          }

      - name: Install Tesseract via Chocolatey
        shell: pwsh
        run: |
          # Chocolatey is pre-installed on windows-latest
          choco install tesseract -y --no-progress

          # Copy installed Tesseract to bundle directory
          $tesseractDir = "C:\Program Files\Tesseract-OCR"
          New-Item -ItemType Directory -Path "_internal\tesseract\tessdata" -Force
          Copy-Item "$tesseractDir\tesseract.exe" "_internal\tesseract\"
          Copy-Item "$tesseractDir\*.dll" "_internal\tesseract\"
          Copy-Item "$tesseractDir\tessdata\eng.traineddata" "_internal\tesseract\tessdata\"

          # Download Traditional Chinese language data
          $chiTraUrl = "https://github.com/tesseract-ocr/tessdata_best/raw/main/chi_tra.traineddata"
          Invoke-WebRequest -Uri $chiTraUrl -OutFile "_internal\tesseract\tessdata\chi_tra.traineddata"

          Write-Host "Tesseract bundled:"
          Get-ChildItem "_internal\tesseract" -Recurse | Select-Object FullName, Length

      - name: Download OpenCV DNN face model
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "models" -Force

          $prototxt = "https://raw.githubusercontent.com/opencv/opencv/master/samples/dnn/face_detector/deploy.prototxt"
          $caffemodel = "https://raw.githubusercontent.com/opencv/opencv_3rdparty/dnn_samples_face_detector_20170830/res10_300x300_ssd_iter_140000.caffemodel"

          Invoke-WebRequest -Uri $prototxt -OutFile "models\deploy.prototxt"
          Invoke-WebRequest -Uri $caffemodel -OutFile "models\res10_300x300_ssd_iter_140000.caffemodel"

      - name: Create default config
        shell: pwsh
        run: |
          $config = @{
            version = 1
            custom_terms = @{}
            file_types = @(".txt", ".md", ".docx", ".xlsx", ".pptx", ".pdf", ".jpg", ".jpeg", ".png", ".bmp", ".tiff")
            logo_templates = @()
            substring_match = $true
          } | ConvertTo-Json -Depth 3
          $config | Out-File -FilePath "config.json" -Encoding utf8

      - name: Create assets directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "assets" -Force

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          if ("${{ matrix.lite }}" -eq "true") {
            pyinstaller anonymizer.spec -- --lite
          } else {
            pyinstaller anonymizer.spec
          }

      - name: Package as portable zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $zipName = "${{ matrix.artifact }}-${version}-Portable.zip"

          # Add a launcher readme
          @"
          資料脫敏工具 Data Anonymizer (${{ matrix.name }})
          ==========================================

          【使用方式】
          1. 將學校設定檔 (.anonymizer-config.zip) 放到此資料夾
          2. 雙擊 ${{ matrix.artifact }}.exe 啟動
          3. 首次啟動會自動提示匯入設定

          免安裝，不需要管理者權限。
          刪除此資料夾即可移除。

          【首次執行注意事項】

          Windows SmartScreen 警告：
            如果出現「Windows 已保護您的電腦」藍色畫面：
            1. 點擊「其他資訊」（畫面左下方小字）
            2. 點擊「仍要執行」
            這是因為程式沒有購買數位簽章，並非病毒。

          防毒軟體誤報：
            PyInstaller 打包的程式偶爾會被防毒軟體誤判。
            如果被攔截，請將此資料夾加入防毒軟體的排除清單：
            - Windows Defender：設定 > 病毒與威脅防護 > 管理設定
              > 排除項目 > 新增排除項目 > 資料夾 > 選擇此資料夾
            - 其他防毒軟體：請洽 IT 部門協助加入白名單

          如有疑問請聯繫提供此工具的同事。
          "@ | Out-File -FilePath "dist\${{ matrix.artifact }}\使用說明.txt" -Encoding utf8

          Compress-Archive -Path "dist\${{ matrix.artifact }}\*" -DestinationPath "dist\$zipName"

          Write-Host "Portable zip:"
          Get-ChildItem "dist\$zipName" | Select-Object Name, Length

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-portable
          path: dist/*-Portable.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          body: |
            ## 下載

            | 版本 | 說明 | 適用 |
            |------|------|------|
            | **DataAnonymizerLite-Portable.zip** | 免安裝版（推薦），僅自訂詞彙+正則偵測 | 一般使用 |
            | **DataAnonymizer-Portable.zip** | 免安裝版，含 NER 人名偵測 | 需要自動偵測人名 |

            ## 使用方式

            1. 下載 zip 解壓到任意位置（桌面、隨身碟皆可）
            2. 將學校設定檔 (`.anonymizer-config.zip`) 放進同一資料夾
            3. 雙擊 `.exe` 啟動
            4. 首次啟動會自動提示匯入設定

            **不需要安裝、不需要管理者權限。**
          files: |
            artifacts/**/*.zip
